<!DOCTYPE html>
<html lang="en"> 
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self On A Shelf</title>
</head>
<body>
    <div class="top">
    <h1>Self On A Shelf</h1>
    <p>Portfolios are boring. Try bookshelfs instead</p>
   </div>

    
     <!-- this is where i start the bookshelf from ig-->

    <div class="shelf-area">
           <div class="shelf-label">Knightmere's Archive</div>





        <div class="shelf">
        <!-- first row of lines ig-->
                    <div class="slotbook1">
                     <img src="assets/book1.gif" alt="book1gif" onclick="document.getElementById('book1').style.display='flex';">

                    
                   </div>


                    <div class="scroll1" >
                            <img src="assets/scroll1.png" alt="scroll1" onclick="document.getElementById('scroll1').style.display='flex';">
             
                    </div>
                    
                    <div class="musicpage">
           
                     <img src="assets/musicpage.png" alt="musicpage" onclick="document.getElementById('poem1').style.display='flex';">

                    </div>

                    <div class="drawframe">
                          
                            <img src="assets/drawframe.png" alt="drawingframe" onclick="document.getElementById('drawframe').style.display='flex';">


                    </div>

     
        </div>

                    <!--second shelf stuff-->


        <div class="shelf">
            
          <img src="assets/book1.gif" alt="book1gif" >


        </div>



                  <!--thrid shelf stuff -->
         
        <div class="shelf">

          <img src="assets/book1.gif" alt="book1gif" >


        
        </div>

       





 














    </div>




      <!-- modal divs go here cuz ehheeh them glitches were wild-->
     
       <div id="book1" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center;" onclick="if(event.target===this) this.style.display='none'">
    
        <iframe src="book1.html" width="600" height="420" style="border:none"></iframe>
               
       </div> 
       <div id="scroll1" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,0.6); align-items: center; justify-content:center;" onclick="if(event.target===this) this.style.display='none'">
             
           <img src="assets/scrollcontainer.png" style="border:none">

       </div>

       <div id="poem1" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,0.6); align-items:center; justify-content:center;" onclick="if(event.target===this) this.style.display='none'">
               
                <iframe src="haytham.html" style="border:none; width: 650px; height:350px;"></iframe>

       </div>

       <div id="drawframe" style="display:none; position:fixed; inset:0; background: rgba(0,0,0,0.6); align-items:center; justify-content:center;" onclick="if(event.target===this) this.style.display='none'">

          <img src="assets/drawing.png" style="border:none; width:400px; height:600px" >

       </div>


</body>
</html>
